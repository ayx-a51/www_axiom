<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Spell Drop</title>
<link rel="icon" href="axiom.ninja.ico" type="image/x-icon">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #1b2a3f 0%, #0b1320 80%);
    color: #e6e9ef;
    user-select: none;
    -webkit-user-select: none;
  }
  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  #field {
    position: absolute;
    inset: 0;
    touch-action: none;
  }
  #hud {
    position: absolute;
    top: env(safe-area-inset-top, 0);
    left: 0;
    right: 0;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    z-index: 10;
    letter-spacing: 0.5px;
    pointer-events: none;
  }
  #score {
    font-size: 28px;
    font-weight: 700;
    color: #f5f7fa;
    text-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
  }
  #level {
    font-size: 13px;
    color: rgba(230, 233, 239, 0.6);
    text-transform: uppercase;
  }
  .block {
    position: absolute;
    top: 0;
    left: 0;
    padding: 12px 18px;
    background: linear-gradient(180deg, #4a6585 0%, #38506b 100%);
    color: #f1f3f7;
    border-radius: 3px;
    font-size: clamp(16px, 4.6vw, 22px);
    font-weight: 500;
    white-space: nowrap;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    touch-action: none;
    cursor: grab;
    will-change: transform, background;
    transition: background 0.12s, box-shadow 0.12s;
  }
  .block.dragging { cursor: grabbing; }
  .block[data-dir="right"] {
    background: linear-gradient(180deg, #4aa05f 0%, #357c47 100%);
  }
  .block[data-dir="left"] {
    background: linear-gradient(180deg, #c14a4a 0%, #9b3333 100%);
  }
  .block.settled {
    background: linear-gradient(180deg, #586676 0%, #3f4b59 100%);
    color: rgba(241, 243, 247, 0.65);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    cursor: default;
  }
  .block.fast {
    background: linear-gradient(180deg, #c14a4a 0%, #7a2828 100%);
    box-shadow: 0 6px 20px rgba(193, 74, 74, 0.5);
  }
  #floor {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 38px;
    background:
      repeating-linear-gradient(
        45deg,
        rgba(143, 214, 164, 0.08) 0,
        rgba(143, 214, 164, 0.08) 8px,
        rgba(11, 19, 32, 0.5) 8px,
        rgba(11, 19, 32, 0.5) 16px
      );
    border-top: 2px solid rgba(143, 214, 164, 0.55);
    box-shadow: 0 -2px 14px rgba(143, 214, 164, 0.12);
    pointer-events: none;
    z-index: 1;
  }
  #instructions {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0) + 10px);
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    color: rgba(230, 233, 239, 0.55);
    letter-spacing: 0.5px;
    pointer-events: none;
    z-index: 2;
  }
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(11, 19, 32, 0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 20px;
    text-align: center;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: 38px;
    margin: 0 0 12px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(180deg, #f5f7fa 0%, #b8c2cd 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #overlay p {
    margin: 4px 0;
    color: rgba(230, 233, 239, 0.75);
    max-width: 320px;
    line-height: 1.5;
  }
  #overlay button {
    margin-top: 28px;
    background: linear-gradient(180deg, #4a6585 0%, #38506b 100%);
    color: #f1f3f7;
    border: none;
    padding: 14px 36px;
    border-radius: 32px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #overlay button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.5);
  }
  #overlay button:active { transform: translateY(0); }
  .legend {
    margin-top: 32px;
    font-size: 12px;
    color: rgba(230, 233, 239, 0.45);
    max-width: 300px;
    line-height: 1.7;
  }
  .arrow {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    margin: 0 2px;
  }
  .arrow.left  { background: rgba(193, 74, 74, 0.2); color: #e89090; }
  .arrow.right { background: rgba(74, 160, 95, 0.2); color: #8fd6a4; }
  .score-pop {
    position: absolute;
    pointer-events: none;
    font-weight: 700;
    font-size: 22px;
    color: #8fd6a4;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    animation: floatUp 0.7s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0)   scale(0.7); opacity: 0; }
    20%  { transform: translateY(-8px) scale(1.1); opacity: 1; }
    100% { transform: translateY(-50px) scale(1); opacity: 0; }
  }
</style>
</head>
<body>
<div id="game">
  <div id="hud">
    <span id="score">0</span>
    <span id="level">Level 1</span>
  </div>
  <div id="field"></div>
  <div id="floor"></div>
  <div id="instructions">
    <span class="arrow left">&larr; misspelled</span>
    <span class="arrow right">correctly spelled &rarr;</span>
  </div>
  <div id="overlay">
    <h1 id="overlayTitle">Spell Drop</h1>
    <p id="overlayMsg">Words fall from the sky. Swipe right if a word is spelled correctly &mdash; left if it&rsquo;s misspelled.</p>
    <button id="startBtn">Start</button>
    <div class="legend">
      Be quick &mdash; be sure. Wrong swipes hit the wall and pile up.<br>
      When the stack reaches the top, the game ends.
    </div>
  </div>
</div>
<script>
(function () {
  "use strict";

  const PAIRS_BY_TIER = [
    // Tier 0 - short, very common
    [
      { right: "friend",   wrong: "freind"   },
      { right: "their",    wrong: "thier"    },
      { right: "weird",    wrong: "wierd"    },
      { right: "piece",    wrong: "peice"    },
      { right: "field",    wrong: "feild"    },
      { right: "truly",    wrong: "truely"   },
      { right: "thief",    wrong: "theif"    },
      { right: "eighth",   wrong: "eigth"    },
      { right: "until",    wrong: "untill"   },
      { right: "lying",    wrong: "lieing"   },
      { right: "fierce",   wrong: "feirce"   },
      { right: "niece",    wrong: "neice"    },
      { right: "chief",    wrong: "cheif"    },
      { right: "yield",    wrong: "yeild"    },
      { right: "ceiling",  wrong: "cieling"  },
      { right: "height",   wrong: "hieght"   },
      { right: "writing",  wrong: "writting" },
      { right: "coming",   wrong: "comming"  },
      { right: "tongue",   wrong: "tounge"   },
      { right: "across",   wrong: "accross"  },
      { right: "already",  wrong: "allready" },
      { right: "forty",    wrong: "fourty"   },
      { right: "ninety",   wrong: "ninty"    },
      { right: "finally",  wrong: "finaly"   },
      { right: "again",    wrong: "agian"    },
      { right: "really",   wrong: "realy"    },
      { right: "people",   wrong: "peopel"   }
    ],
    // Tier 1 - medium-easy
    [
      { right: "believe",     wrong: "beleive"     },
      { right: "receive",     wrong: "recieve"     },
      { right: "because",     wrong: "becuase"     },
      { right: "tomorrow",    wrong: "tommorow"    },
      { right: "happened",    wrong: "happend"     },
      { right: "address",     wrong: "adress"      },
      { right: "amateur",     wrong: "amatuer"     },
      { right: "calendar",    wrong: "calandar"    },
      { right: "weather",     wrong: "wheather"    },
      { right: "library",     wrong: "libary"      },
      { right: "village",     wrong: "vilage"      },
      { right: "familiar",    wrong: "familar"     },
      { right: "license",     wrong: "lisence"     },
      { right: "surprise",    wrong: "suprise"     },
      { right: "successful",  wrong: "sucessful"   },
      { right: "experience",  wrong: "experiance"  },
      { right: "existence",   wrong: "existance"   },
      { right: "foreign",     wrong: "foriegn"     },
      { right: "relief",      wrong: "releif"      },
      { right: "science",     wrong: "sceince"     },
      { right: "league",      wrong: "leauge"      },
      { right: "preferred",   wrong: "prefered"    },
      { right: "pursue",      wrong: "persue"      },
      { right: "beautiful",   wrong: "beutiful"    },
      { right: "thought",     wrong: "thaught"     },
      { right: "twelfth",     wrong: "twelveth"    }
    ],
    // Tier 2
    [
      { right: "separate",    wrong: "seperate"    },
      { right: "definitely",  wrong: "definately"  },
      { right: "beginning",   wrong: "begining"    },
      { right: "argument",    wrong: "arguement"   },
      { right: "February",    wrong: "Febuary"     },
      { right: "government",  wrong: "goverment"   },
      { right: "business",    wrong: "buisness"    },
      { right: "grateful",    wrong: "greatful"    },
      { right: "different",   wrong: "diffrent"    },
      { right: "athlete",     wrong: "athelete"    },
      { right: "vacuum",      wrong: "vaccum"      },
      { right: "column",      wrong: "colum"       },
      { right: "harass",      wrong: "harrass"     },
      { right: "humorous",    wrong: "humerous"    },
      { right: "independent", wrong: "independant" },
      { right: "knowledge",   wrong: "knowlege"    },
      { right: "length",      wrong: "lenght"      },
      { right: "permanent",   wrong: "permanant"   },
      { right: "possess",     wrong: "posess"      },
      { right: "repetition",  wrong: "repitition"  },
      { right: "ridiculous",  wrong: "rediculous"  },
      { right: "receipt",     wrong: "reciept"     },
      { right: "interesting", wrong: "intresting"  },
      { right: "decision",    wrong: "decison"     },
      { right: "explanation", wrong: "explination" },
      { right: "vehicle",     wrong: "vehical"     }
    ],
    // Tier 3
    [
      { right: "necessary",     wrong: "neccessary"     },
      { right: "occurred",      wrong: "occured"        },
      { right: "recommend",     wrong: "reccomend"      },
      { right: "environment",   wrong: "enviroment"     },
      { right: "restaurant",    wrong: "restaraunt"     },
      { right: "conscience",    wrong: "concience"      },
      { right: "embarrass",     wrong: "embarass"       },
      { right: "guarantee",     wrong: "garantee"       },
      { right: "cemetery",      wrong: "cemetary"       },
      { right: "privilege",     wrong: "priviledge"     },
      { right: "noticeable",    wrong: "noticable"      },
      { right: "guidance",      wrong: "guidence"       },
      { right: "apparently",    wrong: "apparantly"     },
      { right: "disappear",     wrong: "dissapear"      },
      { right: "disappoint",    wrong: "dissapoint"     },
      { right: "exaggerate",    wrong: "exagerate"      },
      { right: "pronunciation", wrong: "pronounciation" },
      { right: "medieval",      wrong: "medeival"       },
      { right: "personnel",     wrong: "personel"       },
      { right: "siege",         wrong: "seige"          },
      { right: "playwright",    wrong: "playwrite"      },
      { right: "discipline",    wrong: "disipline"      },
      { right: "convenient",    wrong: "convienient"    },
      { right: "leisure",       wrong: "liesure"        },
      { right: "relevant",      wrong: "relevent"       },
      { right: "jealous",       wrong: "jelous"         }
    ],
    // Tier 4 - hardest
    [
      { right: "accommodate",    wrong: "accomodate"     },
      { right: "entrepreneur",   wrong: "entreprenuer"   },
      { right: "maintenance",    wrong: "maintainance"   },
      { right: "millennium",     wrong: "millenium"      },
      { right: "rhythm",         wrong: "rythm"          },
      { right: "questionnaire",  wrong: "questionaire"   },
      { right: "bureaucracy",    wrong: "beaurocracy"    },
      { right: "occasionally",   wrong: "occassionally"  },
      { right: "liaison",        wrong: "liason"         },
      { right: "mischievous",    wrong: "mischievious"   },
      { right: "pharaoh",        wrong: "pharoah"        },
      { right: "consensus",      wrong: "concensus"      },
      { right: "camouflage",     wrong: "camoflage"      },
      { right: "chauffeur",      wrong: "chaufeur"       },
      { right: "hierarchy",      wrong: "heirarchy"      },
      { right: "inoculate",      wrong: "innoculate"     },
      { right: "perseverance",   wrong: "perserverance"  },
      { right: "pseudonym",      wrong: "psuedonym"      },
      { right: "itinerary",      wrong: "itenarary"      },
      { right: "surveillance",   wrong: "surveilance"    },
      { right: "acquire",        wrong: "aquire"         },
      { right: "exhilarate",     wrong: "exilerate"      },
      { right: "fluorescent",    wrong: "flourescent"    },
      { right: "indispensable",  wrong: "indispensible"  },
      { right: "reminiscent",    wrong: "reminescent"    },
      { right: "conscientious",  wrong: "conscientous"   }
    ]
  ];

  const field        = document.getElementById("field");
  const scoreEl      = document.getElementById("score");
  const levelEl      = document.getElementById("level");
  const overlay      = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlayTitle");
  const overlayMsg   = document.getElementById("overlayMsg");
  const startBtn     = document.getElementById("startBtn");

  let fieldWidth, fieldHeight, floorY, ceilingY;
  let blocks = [];
  let score = 0;
  let best = +(localStorage.getItem("spellDrop.best") || 0);
  let running = false;
  let lastTime = 0;
  let spawnTimer = 0;

  const SWIPE_THRESHOLD = 60;
  const FLY_SPEED       = 1400;
  const BASE_FALL_VY    = 55;
  const GRAVITY         = 1400;
  const WALL_DAMP       = 0.35;
  const FLOOR_BOUNCE    = 0.32;
  const WALL_RESTITUTION = 0.38;

  function measureField() {
    fieldWidth  = window.innerWidth;
    fieldHeight = window.innerHeight;
    floorY      = fieldHeight - 38;
    ceilingY    = 56;
  }

  function tier() {
    return Math.min(Math.floor(score / 6), PAIRS_BY_TIER.length - 1);
  }

  function fallSpeed() {
    return BASE_FALL_VY + tier() * 14;
  }

  function spawnInterval() {
    return Math.max(0.95, 2.3 - tier() * 0.27);
  }

  const RECENT_LIMIT = 10;
  let recentWords = [];

  function pickPair() {
    const t = tier();
    const pool = [];
    for (let i = 0; i <= t; i++) pool.push.apply(pool, PAIRS_BY_TIER[i]);
    let pair = pool[(Math.random() * pool.length) | 0];
    for (let tries = 0; tries < 15 && recentWords.indexOf(pair.right) !== -1; tries++) {
      pair = pool[(Math.random() * pool.length) | 0];
    }
    recentWords.push(pair.right);
    if (recentWords.length > RECENT_LIMIT) recentWords.shift();
    return pair;
  }

  function applyTransform(b) {
    let rot = b.angle || 0;
    if (b.dragging) rot += b.dragX / 28;
    b.el.style.transform =
      "translate(" + (b.x + b.dragX) + "px," + b.y + "px) rotate(" + rot + "deg)";
  }

  function updateHUD() {
    scoreEl.textContent = score;
    levelEl.textContent = "Level " + (tier() + 1);
  }

  function popScore(b) {
    const pop = document.createElement("div");
    pop.className = "score-pop";
    pop.textContent = "+1";
    pop.style.left = (b.x + b.width / 2 - 10) + "px";
    pop.style.top  = (b.y) + "px";
    field.appendChild(pop);
    setTimeout(function () { pop.remove(); }, 750);
  }

  function spawn() {
    const pair = pickPair();
    const misspelled = Math.random() < 0.5;
    const word = misspelled ? pair.wrong : pair.right;

    const el = document.createElement("div");
    el.className = "block";
    el.textContent = word;
    field.appendChild(el);

    const width  = el.offsetWidth;
    const height = el.offsetHeight;
    const maxX   = Math.max(0, fieldWidth - width);
    const x      = Math.random() * maxX;

    const block = {
      el: el,
      word: word,
      misspelled: misspelled,
      x: x,
      y: -height - 4,
      vx: 0,
      vy: fallSpeed(),
      width: width,
      height: height,
      angle: 0,
      omega: 0,
      state: "falling",
      dragX: 0,
      dragging: false,
      startX: 0
    };
    blocks.push(block);
    attachSwipe(block);
    applyTransform(block);
  }

  function attachSwipe(block) {
    const el = block.el;

    el.addEventListener("pointerdown", function (e) {
      if (block.state !== "falling") return;
      block.dragging = true;
      block.startX = e.clientX;
      block.dragX = 0;
      try { el.setPointerCapture(e.pointerId); } catch (_) {}
      el.classList.add("dragging");
      e.preventDefault();
    });

    el.addEventListener("pointermove", function (e) {
      if (!block.dragging) return;
      block.dragX = e.clientX - block.startX;
      applyTransform(block);
      const d = block.dragX;
      if      (d >  20) el.dataset.dir = "right";
      else if (d < -20) el.dataset.dir = "left";
      else              delete el.dataset.dir;
    });

    function finish() {
      if (!block.dragging) return;
      block.dragging = false;
      el.classList.remove("dragging");
      delete el.dataset.dir;

      if (block.state !== "falling") {
        block.dragX = 0;
        applyTransform(block);
        return;
      }

      if (Math.abs(block.dragX) > SWIPE_THRESHOLD) {
        const userSaysCorrect = block.dragX > 0;
        const actuallyCorrect = !block.misspelled;
        const userRight = userSaysCorrect === actuallyCorrect;
        const dir = block.dragX > 0 ? 1 : -1;

        block.x += block.dragX;
        block.dragX = 0;
        block.vx = dir * FLY_SPEED;

        if (userRight) {
          block.state = "flying-correct";
          score++;
          updateHUD();
          popScore(block);
        } else {
          block.state = "flying-wrong";
          el.classList.add("fast");
        }
      } else {
        block.dragX = 0;
      }
      applyTransform(block);
    }

    el.addEventListener("pointerup", finish);
    el.addEventListener("pointercancel", finish);
  }

  // Returns { stopY, support } - highest top the block would rest on, and the
  // settled block (or null for floor) directly under its center of mass.
  function settleInfo(block) {
    let stopY = floorY - block.height;
    let support = null;
    let supportLeft = 0;
    let supportRight = fieldWidth;
    let onFloor = true;

    for (let i = 0; i < blocks.length; i++) {
      const b = blocks[i];
      if (b === block || b.state !== "settled") continue;
      if (block.x + block.width <= b.x) continue;
      if (block.x >= b.x + b.width) continue;
      const top = b.y - block.height;
      if (top < stopY) {
        stopY = top;
        support = b;
        supportLeft = b.x;
        supportRight = b.x + b.width;
        onFloor = false;
      } else if (top === stopY && !onFloor) {
        // adjacent support of same height — extend the support span
        supportLeft = Math.min(supportLeft, b.x);
        supportRight = Math.max(supportRight, b.x + b.width);
      }
    }

    return {
      stopY: stopY,
      onFloor: onFloor,
      supportLeft: supportLeft,
      supportRight: supportRight
    };
  }

  // True if center of mass is over the support span.
  function isStable(b, info) {
    if (info.onFloor) return true;
    const com = b.x + b.width / 2;
    return com > info.supportLeft + 2 && com < info.supportRight - 2;
  }

  // Direction (-1 left, +1 right) the block will tip if unstable.
  function tipDirection(b, info) {
    const com = b.x + b.width / 2;
    const supCenter = (info.supportLeft + info.supportRight) / 2;
    return com < supCenter ? -1 : 1;
  }

  function startTumble(b, info) {
    const dir = tipDirection(b, info);
    b.state = "tumbling";
    // overhang fraction drives how strong the tip is
    const overhang = dir < 0
      ? (info.supportLeft - b.x) / b.width
      : (b.x + b.width - info.supportRight) / b.width;
    const k = Math.max(0.2, Math.min(0.9, overhang));
    b.vx = dir * (80 + k * 220);
    b.vy = Math.max(b.vy * 0.4, 40);
    b.omega = dir * (110 + k * 220); // deg / sec
  }

  function step(dt) {
    const next = [];
    for (let i = 0; i < blocks.length; i++) {
      const b = blocks[i];

      switch (b.state) {

        case "falling": {
          b.y += b.vy * dt;
          const info = settleInfo(b);
          if (b.y >= info.stopY) {
            b.y = info.stopY;
            if (isStable(b, info)) {
              b.state = "settled";
              b.angle = 0;
              b.vx = 0; b.vy = 0; b.omega = 0;
              b.el.classList.add("settled");
              if (b.y < ceilingY) {
                applyTransform(b);
                next.push(b);
                for (let j = i + 1; j < blocks.length; j++) next.push(blocks[j]);
                blocks = next;
                gameOver();
                return;
              }
            } else {
              startTumble(b, info);
            }
          }
          break;
        }

        case "tumbling": {
          b.vy += GRAVITY * dt;
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          b.angle += b.omega * dt;

          // wall bounce
          if (b.x < 0) { b.x = 0; b.vx = -b.vx * WALL_DAMP; b.omega *= -WALL_DAMP; }
          else if (b.x + b.width > fieldWidth) {
            b.x = fieldWidth - b.width;
            b.vx = -b.vx * WALL_DAMP;
            b.omega *= -WALL_DAMP;
          }

          const info = settleInfo(b);
          if (b.y >= info.stopY) {
            b.y = info.stopY;
            if (isStable(b, info) && Math.abs(b.vy) < 120 && Math.abs(b.vx) < 60) {
              b.state = "settled";
              // keep the landing angle (normalized); the settled case eases it flat
              b.angle = ((b.angle % 360) + 540) % 360 - 180;
              b.vx = 0; b.vy = 0; b.omega = 0;
              b.el.classList.add("settled");
              if (b.y < ceilingY) {
                applyTransform(b);
                next.push(b);
                for (let j = i + 1; j < blocks.length; j++) next.push(blocks[j]);
                blocks = next;
                gameOver();
                return;
              }
            } else {
              // bounce on contact, lose vertical energy, keep tumbling
              b.vy = -b.vy * FLOOR_BOUNCE;
              b.vx *= 0.7;
              b.omega *= 0.7;
              if (!isStable(b, info)) {
                const dir = tipDirection(b, info);
                if ((dir > 0 && b.vx < 60) || (dir < 0 && b.vx > -60)) {
                  b.vx += dir * 90;
                  b.omega += dir * 60;
                }
              }
            }
          }
          break;
        }

        case "settled": {
          if (b.angle !== 0) {
            b.angle *= Math.max(0, 1 - 12 * dt);
            if (Math.abs(b.angle) < 0.4) b.angle = 0;
          }
          break;
        }

        case "flying-correct": {
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          if (b.x + b.width < -20 || b.x > fieldWidth + 20) {
            b.state = "gone";
            b.el.remove();
            continue;
          }
          break;
        }

        case "flying-wrong": {
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          if (b.x < 0 || b.x + b.width > fieldWidth) {
            const dir = b.vx > 0 ? 1 : -1;
            b.x = Math.max(0, Math.min(fieldWidth - b.width, b.x));
            // ricochet: reflect off the wall, pop up a little, start spinning
            b.vx = -dir * FLY_SPEED * WALL_RESTITUTION;
            b.vy = -260;
            b.omega = -dir * (240 + Math.random() * 160);
            b.state = "tumbling";
            b.el.classList.add("fast");
          }
          break;
        }
      }

      applyTransform(b);
      next.push(b);
    }
    blocks = next;
  }

  function tick(t) {
    if (!running) return;
    if (!lastTime) lastTime = t;
    const dt = Math.min(0.05, (t - lastTime) / 1000);
    lastTime = t;

    spawnTimer += dt;
    if (spawnTimer >= spawnInterval()) {
      spawnTimer = 0;
      spawn();
    }

    step(dt);
    if (running) requestAnimationFrame(tick);
  }

  function start() {
    measureField();
    for (let i = 0; i < blocks.length; i++) blocks[i].el.remove();
    blocks = [];
    recentWords = [];
    score = 0;
    spawnTimer = spawnInterval() - 0.6;
    lastTime = 0;
    updateHUD();
    overlay.classList.add("hidden");
    running = true;
    spawn();
    requestAnimationFrame(tick);
  }

  function gameOver() {
    running = false;
    if (score > best) {
      best = score;
      localStorage.setItem("spellDrop.best", String(best));
    }
    overlayTitle.textContent = "Stack Overflow";
    overlayMsg.innerHTML =
      "Score <b>" + score + "</b>" +
      (best ? "  &middot;  Best <b>" + best + "</b>" : "");
    startBtn.textContent = "Play again";
    overlay.classList.remove("hidden");
  }

  startBtn.addEventListener("click", start);

  window.addEventListener("resize", function () {
    measureField();
  });

  measureField();
  updateHUD();
})();
</script>
</body>
</html>
