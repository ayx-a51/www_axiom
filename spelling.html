<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self'; font-src 'self'; base-uri 'none'; form-action 'none'">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Spell Drop</title>
<link rel="icon" href="axiom.ninja.ico" type="image/x-icon">
<link rel="preload" href="manrope.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: "Manrope";
    src: url("manrope.woff2") format("woff2");
    font-weight: 200 800;
    /* `optional` skips the swap: if the font isn't ready within ~100ms the
       browser uses the fallback for the whole session and never re-renders.
       Combined with the preload above the font is virtually always ready
       in time, so there's no flash and no title shift. */
    font-display: optional;
  }
  :root {
    --text: #eaf1fb;
    --muted: rgba(234, 241, 251, 0.55);
    --radius: 13px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }
  body {
    font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(ellipse at 50% 50%, #0e1626 0%, #060a14 60%, #03060c 100%);
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game {
    position: relative;
    /* fixed 9:16 portrait field, fits inside the viewport */
    width: min(100vw, calc(100dvh * 9 / 16));
    height: min(100dvh, calc(100vw * 16 / 9));
    overflow: hidden;
    border-radius: 14px;
    background: radial-gradient(ellipse at 50% -8%, #1b2c47 0%, #0c1426 58%, #070b14 100%);
    box-shadow:
      0 40px 80px -24px rgba(0, 0, 0, 0.75),
      0 0 0 1px rgba(255, 255, 255, 0.05);
  }
  /* slow-drifting light blobs for subtle depth */
  #game::before {
    content: "";
    position: absolute;
    inset: -25%;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(38% 38% at 28% 26%, rgba(45, 212, 191, 0.18), transparent 70%),
      radial-gradient(42% 42% at 74% 70%, rgba(20, 184, 166, 0.14), transparent 70%);
    animation: drift 26s ease-in-out infinite alternate;
  }
  /* vignette above the field for depth */
  #game::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    box-shadow: inset 0 0 180px 44px rgba(0, 0, 0, 0.55);
  }
  @keyframes drift {
    0%   { transform: translate3d(-3%, -2%, 0) scale(1); }
    100% { transform: translate3d(3%, 2%, 0) scale(1.08); }
  }
  #field {
    position: absolute;
    inset: 0;
    touch-action: none;
    container-type: inline-size; /* lets blocks size relative to the box */
  }
  #field.shake { animation: shake 0.36s cubic-bezier(.36,.07,.19,.97); }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15% { transform: translateX(-7px); }
    32% { transform: translateX(6px); }
    50% { transform: translateX(-5px); }
    68% { transform: translateX(4px); }
    85% { transform: translateX(-2px); }
  }
  #hud {
    position: absolute;
    top: env(safe-area-inset-top, 0);
    left: 0;
    right: 0;
    padding: 16px 22px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    z-index: 10;
    pointer-events: none;
  }
  #score {
    font-size: 30px;
    font-weight: 800;
    color: #f7fafe;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 14px rgba(0, 0, 0, 0.5);
    transform-origin: left center;
  }
  #score.bump { animation: bump 0.32s ease-out; }
  @keyframes bump {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.32); color: #6ee7a0; }
    100% { transform: scale(1); }
  }
  #level {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  /* danger glow near the ceiling, intensifies as the stack climbs */
  #danger {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 38%;
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    background: linear-gradient(180deg, rgba(236, 72, 153, 0.55) 0%, rgba(236, 72, 153, 0.12) 55%, transparent 100%);
    transition: opacity 0.25s ease;
  }
  #danger.crit { animation: dangerPulse 0.9s ease-in-out infinite; }
  @keyframes dangerPulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }
  .block {
    position: absolute;
    top: 0;
    left: 0;
    padding: 13px 19px;
    background: linear-gradient(158deg, rgba(45, 212, 191, 0.94) 0%, rgba(13, 148, 136, 0.94) 100%);
    color: #f4fefb;
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: var(--radius);
    font-size: clamp(15px, 5cqw, 22px);
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
    box-shadow:
      0 12px 26px -10px rgba(7, 92, 84, 0.65),
      0 3px 8px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.3),
      inset 0 -3px 7px rgba(0, 0, 0, 0.18);
    touch-action: none;
    cursor: grab;
    will-change: transform, opacity;
    transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .block.dragging { cursor: grabbing; }
  .block.locked {
    color: rgba(244, 247, 252, 0.92);
    cursor: default;
  }
  .block.ok {
    /* spring-green at hue ~145, ~28 from teal-173 so it reads as
       distinctly green at a glance rather than a teal variant */
    background: linear-gradient(158deg, rgba(76, 224, 133, 0.95) 0%, rgba(16, 165, 85, 0.95) 100%);
    border-color: rgba(180, 245, 210, 0.4);
    box-shadow:
      0 12px 26px -10px rgba(8, 130, 60, 0.65),
      0 0 20px rgba(76, 224, 133, 0.32),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }
  .block.mis {
    /* pink-magenta at hue ~328 (pink-500 -> pink-700): warm, not purple */
    background: linear-gradient(158deg, rgba(236, 72, 153, 0.95) 0%, rgba(190, 24, 93, 0.95) 100%);
    border-color: rgba(252, 207, 224, 0.42);
    box-shadow:
      0 12px 26px -10px rgba(150, 18, 70, 0.65),
      0 0 20px rgba(236, 72, 153, 0.32),
      inset 0 1px 0 rgba(255, 255, 255, 0.28);
  }
  #floor {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 38px;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(54, 74, 88, 0.6) 0%, rgba(22, 34, 44, 0.92) 100%);
    border-top: 2px solid rgba(45, 212, 191, 0.85);
    box-shadow: 0 -8px 22px -6px rgba(45, 212, 191, 0.24);
  }
  .puff {
    position: absolute;
    width: 46px; height: 46px;
    margin: -23px 0 0 -23px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 68%);
    animation: puff 0.5s ease-out forwards;
  }
  @keyframes puff {
    0%   { transform: scale(0.35); opacity: 0.7; }
    100% { transform: scale(1.5);  opacity: 0; }
  }
  #levelUp {
    position: absolute;
    top: 36%; left: 0; right: 0;
    text-align: center;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 1px;
    color: #99f6e4;
    text-shadow: 0 6px 26px rgba(20, 184, 166, 0.65);
    opacity: 0;
    pointer-events: none;
    z-index: 40;
  }
  #levelUp.show { animation: levelUp 1.35s ease-out; }
  @keyframes levelUp {
    0%   { opacity: 0; transform: translateY(14px) scale(0.8); }
    18%  { opacity: 1; transform: translateY(0) scale(1); }
    78%  { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-14px) scale(1.02); }
  }
  #flash {
    position: absolute;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    box-shadow: inset 0 0 130px 26px rgba(236, 72, 153, 0.72);
  }
  #flash.show { animation: flashRed 0.42s ease-out; }
  @keyframes flashRed {
    0%   { opacity: 0; }
    22%  { opacity: 1; }
    100% { opacity: 0; }
  }
  #instructions {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    height: 38px; /* sits inside the floor strip, vertically centered */
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    pointer-events: none;
    z-index: 2;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
    padding: 20px;
    background: rgba(8, 13, 24, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  #overlay.hidden { display: none; }
  .panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 380px;
    width: 100%;
    padding: 38px 30px 32px;
    border-radius: 26px;
    background: linear-gradient(180deg, rgba(30, 46, 72, 0.62) 0%, rgba(18, 28, 46, 0.62) 100%);
    border: 1px solid rgba(255, 255, 255, 0.13);
    box-shadow:
      0 36px 90px -24px rgba(0, 0, 0, 0.75),
      inset 0 1px 0 rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px) saturate(1.25);
    -webkit-backdrop-filter: blur(18px) saturate(1.25);
  }
  #pauseOverlay {
    position: absolute;
    inset: 0;
    background: rgba(8, 13, 24, 0.5);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 95;
    backdrop-filter: blur(7px);
    -webkit-backdrop-filter: blur(7px);
    cursor: pointer;
    text-align: center;
  }
  #pauseOverlay.hidden { display: none; }
  #pauseOverlay h2 {
    font-size: 30px;
    font-weight: 800;
    margin: 0 0 8px;
    color: #f7fafe;
    letter-spacing: 1px;
  }
  #pauseOverlay p { font-size: 14px; color: var(--muted); margin: 0; font-weight: 600; }
  #overlay h1 {
    font-size: 42px;
    margin: 0 0 14px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: linear-gradient(180deg, #ffffff 0%, #99f6e4 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #overlay p {
    margin: 4px 0;
    color: rgba(234, 241, 251, 0.78);
    max-width: 320px;
    line-height: 1.55;
  }
  #overlay button {
    margin-top: 28px;
    background: linear-gradient(180deg, #14b8a6 0%, #0d9488 100%);
    color: #fff;
    border: none;
    padding: 15px 44px;
    border-radius: 30px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 10px 26px -6px rgba(13, 148, 136, 0.65), inset 0 1px 0 rgba(255, 255, 255, 0.28);
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  }
  #overlay button:hover { transform: translateY(-2px); filter: brightness(1.08); }
  #overlay button:active { transform: translateY(0); }
  #langRow {
    margin-top: 26px;
    display: flex;
    gap: 10px;
  }
  #overlay #langRow .lang {
    margin-top: 0;
    padding: 9px 17px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 18px;
    background: rgba(45, 212, 191, 0.10);
    color: rgba(234, 241, 251, 0.72);
    border: 1px solid rgba(45, 212, 191, 0.22);
    box-shadow: none;
  }
  #overlay #langRow .lang.active {
    background: linear-gradient(180deg, #14b8a6 0%, #0d9488 100%);
    color: #fff;
    border-color: rgba(255, 255, 255, 0.4);
    box-shadow: 0 6px 16px -6px rgba(13, 148, 136, 0.65);
  }
  .legend {
    margin-top: 30px;
    font-size: 12px;
    color: rgba(234, 241, 251, 0.45);
    max-width: 300px;
    line-height: 1.7;
  }
  .arrow {
    display: inline-flex;
    align-items: center;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .arrow.left  {
    color: #f8a5cb;
    background: rgba(236, 72, 153, 0.15);
    border-color: rgba(244, 114, 182, 0.35);
  }
  .arrow.right {
    color: #6ee7a0;
    background: rgba(76, 224, 133, 0.15);
    border-color: rgba(134, 239, 172, 0.35);
  }
  .score-pop {
    position: absolute;
    pointer-events: none;
    font-weight: 800;
    font-size: 24px;
    color: #6ee7a0;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    animation: floatUp 0.75s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0)   scale(0.7); opacity: 0; }
    20%  { transform: translateY(-10px) scale(1.15); opacity: 1; }
    100% { transform: translateY(-56px) scale(1); opacity: 0; }
  }
</style>
</head>
<body>
<div id="game">
  <div id="hud">
    <span id="score">0</span>
    <span id="level">Level 1</span>
  </div>
  <div id="field"></div>
  <div id="floor"></div>
  <div id="danger"></div>
  <div id="levelUp"></div>
  <div id="flash"></div>
  <div id="pauseOverlay" class="hidden">
    <h2 id="pauseTitle">Paused</h2>
    <p id="pauseHint">Tap to continue</p>
  </div>
  <div id="instructions">
    <span class="arrow left" id="hintLeft">&larr; misspelled</span>
    <span class="arrow right" id="hintRight">correctly spelled &rarr;</span>
  </div>
  <div id="overlay">
    <div class="panel">
      <h1 id="overlayTitle">Spell Drop</h1>
      <p id="overlayMsg">Words fall from the sky. Swipe right if a word is spelled correctly &mdash; left if it&rsquo;s misspelled.</p>
      <div id="langRow">
        <button class="lang" data-lang="en">English</button>
        <button class="lang" data-lang="de">Deutsch</button>
        <button class="lang" data-lang="fr">Fran&ccedil;ais</button>
      </div>
      <button id="startBtn">Start</button>
      <div class="legend" id="legend">
        Be quick &mdash; be sure. Wrong swipes hit the wall and pile up.<br>
        When the stack reaches the top, the game ends.
      </div>
    </div>
  </div>
</div>
<script src="matter.min.js"></script>

    return;

  const CAT_WORLD   = 0x0001; // walls + floor

  const CAT_SETTLED = 0x0004;
  const CAT_FLYING  = 0x0008; // wrong swipe, pre-impact
  const MASK_FALLING = CAT_WORLD | CAT_FALLING | CAT_SETTLED;
  const MASK_ALL     = CAT_WORLD | CAT_FALLING | CAT_SETTLED | CAT_FLYING;

  function measureField() {
    // measure the game element, not the window: 100dvh and window.innerHeight
    // can disagree on mobile, which made the physics floor float above the
    // visual one
    fieldWidth  = gameEl.clientWidth;
    fieldHeight = gameEl.clientHeight;
    floorY      = fieldHeight - 38;
    ceilingY    = 56;
  }

  function buildWalls() {
    if (walls.length) Composite.remove(engine.world, walls);
    const T = 400; // wall thickness, kept fat so fast bodies can't tunnel
    const sideWall = { isStatic: true, friction: 0.1, restitution: 0.4 };
    walls = [
      Bodies.rectangle(fieldWidth / 2, floorY + T / 2, fieldWidth + 2 * T, T,
        { isStatic: true, friction: 0.6, restitution: 0.2 }),
      Bodies.rectangle(-T / 2, 0, T, fieldHeight * 6, sideWall),
      Bodies.rectangle(fieldWidth + T / 2, 0, T, fieldHeight * 6, sideWall)
    ];
    // brushing a side wall must not count as "landing"
    walls[1].plugin.isSideWall = true;
    walls[2].plugin.isSideWall = true;
    Composite.add(engine.world, walls);
  }

  function tier() {
    return Math.min(Math.floor(score / 6), WORDS[lang].length - 1);
  }

  function fallSpeed() {
    return BASE_FALL_VY + tier() * 14;
  }

  function spawnInterval() {
    return Math.max(0.95, 2.3 - tier() * 0.27);
  }

  const RECENT_LIMIT = 10;
  let recentWords = [];

  function pickPair() {
    const tiers = WORDS[lang];
    const t = tier();
    const pool = [];
    for (let i = 0; i <= t; i++) pool.push.apply(pool, tiers[i]);
    let pair = pool[(Math.random() * pool.length) | 0];
    for (let tries = 0; tries < 15 && recentWords.indexOf(pair.r) !== -1; tries++) {
      pair = pool[(Math.random() * pool.length) | 0];
    }
    recentWords.push(pair.r);
    if (recentWords.length > RECENT_LIMIT) recentWords.shift();
    return pair;
  }

  // math: ~3rd grade at tier 0 up to harder mental math at tier 4. Each
  // generator returns the expression and its real value; pickEquation picks
  // a tier-appropriate one and decides 50/50 whether to show it with the
  // correct answer or a plausibly wrong one.
  const SUP = ["⁰","¹","²","³","⁴","⁵","⁶","⁷","⁸","⁹"];
  function sup(n) { return String(n).split("").map(function (d) { return SUP[+d]; }).join(""); }
  function rint(lo, hi) { return lo + ((Math.random() * (hi - lo + 1)) | 0); }

  const TIER_EQ = [
    function () { // tier 0 - easiest, single digit
      const r = Math.random();
      if (r < 0.5) { const a = rint(1,9), b = rint(1,9); return { expr: a + "+" + b, value: a + b }; }
      if (r < 0.85) { const a = rint(3,10), b = rint(1, a - 1); return { expr: a + "−" + b, value: a - b }; }
      const a = rint(2,5), b = rint(2,5); return { expr: a + "×" + b, value: a * b };
    },
    function () { // tier 1
      const r = Math.random();
      if (r < 0.4) { const a = rint(1,15), b = rint(1,15); return { expr: a + "+" + b, value: a + b }; }
      if (r < 0.7) { const a = rint(5,20), b = rint(1, a - 1); return { expr: a + "−" + b, value: a - b }; }
      const a = rint(2,7), b = rint(2,7); return { expr: a + "×" + b, value: a * b };
    },
    function () { // tier 2
      const r = Math.random();
      if (r < 0.3) { const a = rint(10,30), b = rint(10,30); return { expr: a + "+" + b, value: a + b }; }
      if (r < 0.55) { const a = rint(15,40), b = rint(5, a - 5); return { expr: a + "−" + b, value: a - b }; }
      if (r < 0.85) { const a = rint(2,10), b = rint(2,10); return { expr: a + "×" + b, value: a * b }; }
      const q = rint(2,9), b = rint(2,9); return { expr: (q * b) + "÷" + b, value: q };
    },
    function () { // tier 3
      const r = Math.random();
      if (r < 0.4) { const a = rint(2,12), b = rint(2,12); return { expr: a + "×" + b, value: a * b }; }
      if (r < 0.6) { const a = rint(11,20), b = rint(2,9); return { expr: a + "×" + b, value: a * b }; }
      if (r < 0.8) { const a = rint(2,10); return { expr: a + "²", value: a * a }; }
      const q = rint(2,12), b = rint(2,10); return { expr: (q * b) + "÷" + b, value: q };
    },
    function () { // tier 4
      const r = Math.random();
      if (r < 0.3) { const a = rint(11,25), b = rint(11,15); return { expr: a + "×" + b, value: a * b }; }
      if (r < 0.5) { const a = rint(3,12); return { expr: a + "²", value: a * a }; }
      if (r < 0.65) { const a = rint(2,5); return { expr: a + "³", value: a * a * a }; }
      if (r < 0.8) { const n = rint(3,5); return { expr: "2" + sup(n), value: Math.pow(2, n) }; }
      const a = rint(3,12); return { expr: "√" + (a * a), value: a };
    }
  ];

  function pickEquation() {
    const t = Math.min(tier(), TIER_EQ.length - 1);
    const gen = TIER_EQ[t];
    let eq;
    for (let tries = 0; tries < 15; tries++) {
      eq = gen();
      if (recentWords.indexOf(eq.expr) === -1) break;
    }
    recentWords.push(eq.expr);
    if (recentWords.length > RECENT_LIMIT) recentWords.shift();

    const correct = Math.random() < 0.5;
    let shown = eq.value;
    if (!correct) {
      // small offsets keep the mental check quick; harder tiers allow a
      // bigger miss too, but never anything wild
      const deltas = t < 3 ? [1, -1, 2, -2] : [1, -1, 2, -2, 5, -5];
      shown = eq.value + deltas[(Math.random() * deltas.length) | 0];
      if (shown === eq.value) shown += 1;
      if (shown < 0) shown = eq.value + 1;
    }
    return { text: eq.expr + "=" + shown, isWrong: !correct };
  }

  let shownTier = 0;

  function updateHUD() {
    scoreEl.textContent = score;
    const tr = tier();
    levelEl.textContent = I18N[lang].level + " " + (tr + 1);
    if (running && tr > shownTier) levelUpFlash(tr);
    shownTier = tr;
  }

  // retrigger a CSS animation by toggling its class
  function retrigger(el, cls) {
    el.classList.remove(cls);
    void el.offsetWidth; // force reflow so the animation restarts
    el.classList.add(cls);
  }

  function bumpScore() { retrigger(scoreEl, "bump"); }

  function levelUpFlash(tr) {
    levelUpEl.textContent = I18N[lang].level + " " + (tr + 1);
    retrigger(levelUpEl, "show");
  }

  function wrongFeedback() {
    retrigger(flashEl, "show");
    retrigger(field, "shake");
  }

  function puffAt(x, y) {
    const p = document.createElement("div");
    p.className = "puff";
    p.style.left = x + "px";
    p.style.top  = y + "px";
    field.appendChild(p);
    setTimeout(function () { p.remove(); }, 520);
  }

  function popScore(b) {
    const pop = document.createElement("div");
    pop.className = "score-pop";
    pop.textContent = "+1";
    pop.style.left = (b.body.position.x - 10) + "px";
    pop.style.top  = (b.body.position.y - b.height / 2) + "px";
    field.appendChild(pop);
    setTimeout(function () { pop.remove(); }, 750);
  }

  function syncDOM(b) {
    const p = b.body.position;
    let deg = b.body.angle * 180 / Math.PI;
    // only tilt with the finger while the block is still falling/swipeable;
    // once it has landed mid-drag, show its real physics angle
    if (b.dragging && b.state === "falling") deg += b.dragX / 28;
    b.el.style.transform =
      "translate(" + (p.x - b.width / 2) + "px," + (p.y - b.height / 2) + "px) " +
      "rotate(" + deg + "deg)";
    // soft fade-in as a falling block descends into view from above the top edge
    if (b.state === "falling") {
      const top = p.y - b.height / 2;
      if (top < 30) {
        const o = (top + 10) / 40;
        b.el.style.opacity = o < 0 ? 0 : o > 1 ? 1 : o;
      } else if (b.el.style.opacity !== "") {
        b.el.style.opacity = "";   // fully in: hand opacity back to CSS
      }
    }
  }

  // pick a spawn x that doesn't overlap blocks still near the top
  function spawnX(w) {
    const m = 8; // keep a small gap to the walls
    const minEdgeGap = 36; // horizontal breathing room between any two falling blocks
    for (let tries = 0; tries < 25; tries++) {
      const x = m + w / 2 + Math.random() * Math.max(1, fieldWidth - w - 2 * m);
      let ok = true;
      for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i];
        // every block currently in the air counts, no matter how far it has
        // already fallen, so new words never come down in the same column
        if (b.state !== "falling") continue;
        if (Math.abs(b.body.position.x - x) < (b.width + w) / 2 + minEdgeGap) { ok = false; break; }
      }
      if (ok) return x;
    }
    return null; // no clean column - tell the caller to wait
  }

  function spawn() {
    let word, misspelled;
    if (Math.random() < 0.20) {
      const eq = pickEquation();
      word = eq.text;
      misspelled = eq.isWrong; // "misspelled" = "should be swiped left"
    } else {
      const pair = pickPair();
      misspelled = Math.random() < 0.5;
      word = misspelled ? pair.w : pair.r;
    }

    const el = document.createElement("div");
    el.className = "block";
    el.textContent = word;
    field.appendChild(el);

    const width  = el.offsetWidth;
    const height = el.offsetHeight;
    const x = spawnX(width);
    if (x === null) {
      // no horizontal gap available right now - try again next tick
      el.remove();
      return false;
    }

    const body = Bodies.rectangle(x, -height / 2 - 6, width, height, {
      friction: 0.45,
      frictionStatic: 0.7,
      restitution: 0.25,
      frictionAir: 0.01,
      chamfer: { radius: 12 }, // matches the visual border-radius
      sleepThreshold: 45,
      collisionFilter: { category: CAT_FALLING, mask: MASK_FALLING }
    });

    const block = {
      el: el,
      body: body,
      word: word,
      misspelled: misspelled,
      width: width,
      height: height,
      state: "falling",   // falling -> landed | cleared -> gone
      penalty: false,
      revealed: false,
      dragging: false,
      dragX: 0,
      startX: 0,
      bodyStartX: 0,
      overTime: 0
    };
    body.plugin.block = block;
    Composite.add(engine.world, body);
    blocks.push(block);
    attachSwipe(block);
    syncDOM(block);
    return true;
  }

  // stacked blocks show the truth: green = was spelled correctly, red = not
  function showTruth(block) {
    block.el.classList.add("locked", block.misspelled ? "mis" : "ok");
  }

  function land(block) {
    block.state = "landed";
    block.body.collisionFilter.category = CAT_SETTLED;
    block.body.collisionFilter.mask = MASK_ALL;
    // penalty blocks stay neutral while flying; reveal() colors them on impact.
    // a non-penalty block landing here IS a real impact, so puff now.
    if (!block.penalty) {
      showTruth(block);
      puffAt(block.body.position.x, block.body.position.y + block.height / 2);
    }
  }

  // a wrongly swiped block shows its color and rejoins normal collisions
  // only when it first hits something (wall, floor or stack)
  function reveal(body) {
    const blk = body.plugin && body.plugin.block;
    if (blk && blk.penalty && !blk.revealed) {
      blk.revealed = true;
      showTruth(blk);
      puffAt(blk.body.position.x, blk.body.position.y + blk.height / 2);
      body.collisionFilter.category = CAT_SETTLED;
      body.collisionFilter.mask = MASK_ALL;
    }
  }

  Events.on(engine, "collisionStart", function (ev) {
    for (let k = 0; k < ev.pairs.length; k++) {
      const pair = ev.pairs[k];
      if (pair.bodyA.isSensor || pair.bodyB.isSensor) continue;
      reveal(pair.bodyA);
      reveal(pair.bodyB);
      if (pair.bodyA.plugin.isSideWall || pair.bodyB.plugin.isSideWall) continue;
      const a = pair.bodyA.plugin && pair.bodyA.plugin.block;
      const b = pair.bodyB.plugin && pair.bodyB.plugin.block;
      if (a && a.state === "falling") land(a);
      if (b && b.state === "falling") land(b);
    }
  });

  // also catch contacts that were already active when a body entered the
  // FLYING state - those would never fire a fresh collisionStart, leaving the
  // body stuck grey and non-colliding with falling words
  Events.on(engine, "collisionActive", function (ev) {
    for (let k = 0; k < ev.pairs.length; k++) {
      const pair = ev.pairs[k];
      if (pair.bodyA.isSensor || pair.bodyB.isSensor) continue;
      reveal(pair.bodyA);
      reveal(pair.bodyB);
    }
  });

  function attachSwipe(block) {
    const el = block.el;

    el.addEventListener("pointerdown", function (e) {
      if (block.state !== "falling") return;
      if (activeDrag && activeDrag !== block) return; // ignore second finger
      activeDrag = block;
      block.dragging = true;
      block.startX = e.clientX;
      block.bodyStartX = block.body.position.x;
      block.dragX = 0;
      try { el.setPointerCapture(e.pointerId); } catch (_) {}
      el.classList.add("dragging");
      e.preventDefault();
    });

    el.addEventListener("pointermove", function (e) {
      if (!block.dragging) return;
      block.dragX = e.clientX - block.startX;
    });

    function finish() {
      if (!block.dragging) return;
      block.dragging = false;
      if (activeDrag === block) activeDrag = null;
      el.classList.remove("dragging");

      if (block.state !== "falling") { block.dragX = 0; return; }

      if (Math.abs(block.dragX) > SWIPE_THRESHOLD) {
        const userSaysCorrect = block.dragX > 0;
        const userRight = userSaysCorrect === !block.misspelled;
        const dir = block.dragX > 0 ? 1 : -1;
        const body = block.body;

        if (userRight) {
          block.state = "cleared";
          body.isSensor = true; // glide out without disturbing the stack
          Body.setVelocity(body, { x: dir * FLY_SPEED * PX_PER_STEP, y: -2 });
          Body.setAngularVelocity(body, dir * 0.04);
          score++;
          updateHUD();
          popScore(block);
          bumpScore();
        } else {
          // wrong call: full physics from here on - wall ricochet, bounces,
          // spin. The red reveal waits until the first impact.
          wrongFeedback();
          block.penalty = true;
          land(block);
          // in flight it passes through still-falling words (see reveal)
          body.collisionFilter.category = CAT_FLYING;
          body.collisionFilter.mask = MASK_FLYING;
          Body.setVelocity(body, { x: dir * FLY_SPEED * PX_PER_STEP, y: -3 });
          Body.setAngularVelocity(body, dir * 0.12);
        }
      }
      block.dragX = 0;
    }

    el.addEventListener("pointerup", finish);
    el.addEventListener("pointercancel", finish);
  }

  // enforce constant-speed falling (and drag position) before each physics step
  function preStep() {
    // gravity is integrated on top of the velocity we set; subtract its
    // per-step contribution so the net fall speed is exactly fallSpeed()
    const drift = engine.gravity.y * engine.gravity.scale * STEP_MS * STEP_MS;
    const vy = Math.max(0.1, fallSpeed() * PX_PER_STEP - drift);
    for (let i = 0; i < blocks.length; i++) {
      const b = blocks[i];
      if (b.state !== "falling") continue;
      if (b.dragging) {
        const half = b.width / 2;
        const tx = Math.max(half, Math.min(fieldWidth - half, b.bodyStartX + b.dragX));
        Body.setPosition(b.body, { x: tx, y: b.body.position.y });
      }
      Body.setVelocity(b.body, { x: 0, y: vy });
      Body.setAngularVelocity(b.body, 0);
    }
  }

  function postFrame(dt) {
    let ended = false;
    let highestTop = fieldHeight; // for the danger meter
    for (let i = 0; i < blocks.length; i++) {
      const b = blocks[i];
      const body = b.body;

      if (b.state === "landed" && body.bounds.min.y < highestTop) {
        highestTop = body.bounds.min.y;
      }

      if (b.state === "cleared") {
        if (body.position.x < -b.width || body.position.x > fieldWidth + b.width) {
          Composite.remove(engine.world, body);
          b.el.remove();
          b.state = "gone";
          continue;
        }
      } else if (b.state === "landed") {
        // safety net: a penalty block that came to rest without ever
        // triggering a contact event still gets revealed and rejoins
        // normal collisions, so it can't sit grey blocking the stack
        if (b.penalty && !b.revealed && (body.isSleeping || body.speed < 0.5)) {
          reveal(body);
        }
        // if a body somehow escaped the floor, retire it instead of
        // simulating it forever off-screen
        if (body.position.y > fieldHeight + 400) {
          Composite.remove(engine.world, body);
          b.el.remove();
          b.state = "gone";
          continue;
        }
        // stack reached the top: block resting (not just passing) above the line
        if (body.bounds.min.y < ceilingY && (body.isSleeping || body.speed < 0.2)) {
          b.overTime += dt;
          if (b.overTime > GAMEOVER_HOLD) ended = true;
        } else {
          b.overTime = 0;
        }
      }
      syncDOM(b);
    }
    blocks = blocks.filter(function (b) { return b.state !== "gone"; });

    // danger meter: fades in as the top of the stack climbs toward the ceiling
    const dangerStart = ceilingY + fieldHeight * 0.34;
    let d = (dangerStart - highestTop) / (dangerStart - ceilingY);
    d = d < 0 ? 0 : d > 1 ? 1 : d;
    dangerEl.style.opacity = d;
    dangerEl.classList.toggle("crit", d > 0.75);

    if (ended) gameOver();
  }

  function tick(t) {
    if (!running || paused) return;
    if (!lastTime) lastTime = t;
    const dtMs = Math.min(50, t - lastTime);
    lastTime = t;

    spawnTimer += dtMs / 1000;
    if (spawnTimer >= spawnInterval()) {
      // only reset the timer when we actually placed a block - if no clean
      // column was available, retry next frame so spawns are never doubled up
      if (spawn()) spawnTimer = 0;
    }

    stepAcc += dtMs;
    let steps = 0;
    while (stepAcc >= STEP_MS && steps < 4) {
      preStep();
      Engine.update(engine, STEP_MS);
      stepAcc -= STEP_MS;
      steps++;
    }
    if (steps === 4) stepAcc = 0; // dropped frames: don't spiral

    postFrame(dtMs / 1000);
    if (running) requestAnimationFrame(tick);
  }

  function start() {
    measureField();
    buildWalls();
    for (let i = 0; i < blocks.length; i++) {
      Composite.remove(engine.world, blocks[i].body);
      blocks[i].el.remove();
    }
    // clear any score popups / puffs still animating from the previous round
    const stale = field.querySelectorAll(".score-pop, .puff");
    for (let i = 0; i < stale.length; i++) stale[i].remove();
    blocks = [];
    recentWords = [];
    activeDrag = null;
    paused = false;
    pauseOverlay.classList.add("hidden");
    dangerEl.style.opacity = 0;
    dangerEl.classList.remove("crit");
    shownTier = 0;
    score = 0;
    spawnTimer = spawnInterval() - 0.6;
    lastTime = 0;
    stepAcc = 0;
    updateHUD();
    overlay.classList.add("hidden");
    running = true;
    spawn();
    requestAnimationFrame(tick);
  }

  function gameOver() {
    running = false;
    const t = I18N[lang];
    if (score > best) {
      best = score;
      localStorage.setItem("spellDrop.best." + lang, String(best));
    }
    overlayTitle.textContent = t.over;
    overlayMsg.innerHTML =
      t.scoreLbl + " <b>" + score + "</b>" +
      (best ? "  &middot;  " + t.bestLbl + " <b>" + best + "</b>" : "");
    startBtn.textContent = t.again;
    overlay.classList.remove("hidden");
  }

  const langButtons = document.querySelectorAll("#langRow .lang");

  function applyLang() {
    const t = I18N[lang];
    document.getElementById("hintLeft").innerHTML  = t.hintLeft;
    document.getElementById("hintRight").innerHTML = t.hintRight;
    document.getElementById("legend").innerHTML    = t.legend;
    overlayMsg.innerHTML = t.tagline;
    startBtn.textContent = t.start;
    langButtons.forEach(function (btn) {
      btn.classList.toggle("active", btn.dataset.lang === lang);
    });
    best = +(localStorage.getItem("spellDrop.best." + lang) || 0);
    updateHUD();
  }

  langButtons.forEach(function (btn) {
    btn.addEventListener("click", function () {
      lang = btn.dataset.lang;
      localStorage.setItem("spellDrop.lang", lang);
      recentWords = [];
      applyLang();
    });
  });

  startBtn.addEventListener("click", start);

  // pause when the tab is hidden so the round doesn't quietly run on without
  // the player; on return, show a tap-to-resume veil instead of dropping them
  // straight back into falling blocks
  const pauseOverlay = document.getElementById("pauseOverlay");
  const pauseTitle   = document.getElementById("pauseTitle");
  const pauseHint    = document.getElementById("pauseHint");

  function resume() {
    if (!running || !paused) return;
    paused = false;
    pauseOverlay.classList.add("hidden");
    lastTime = 0;   // avoid a large dt jump on the first frame back
    stepAcc = 0;
    requestAnimationFrame(tick);
  }

  document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
      if (running && !paused) paused = true; // loop stops on next tick
    } else if (running && paused) {
      const t = I18N[lang];
      pauseTitle.textContent = t.paused;
      pauseHint.textContent  = t.resume;
      pauseOverlay.classList.remove("hidden");
    }
  });

  pauseOverlay.addEventListener("pointerdown", function (e) {
    e.preventDefault();
    resume();
  });

  window.addEventListener("resize", function () {
    // With letterboxing the box dimensions can change together (it scales to
    // fit), so we react to any real size change. Identical dimensions during
    // play are skipped to avoid mobile URL-bar churn rebuilding the walls
    // and jolting the settled stack.
    const w = gameEl.clientWidth, h = gameEl.clientHeight;
    if (running && w === fieldWidth && h === fieldHeight) return;
    measureField();
    buildWalls();
  });

  measureField();
  applyLang();
})();
</script>
</body>
</html>
